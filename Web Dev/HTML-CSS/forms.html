<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms</title>
</head>
<body>
    <h2>Login Page</h2>
    <form>
        <label for="username">Enter Username :</label>
        <input type="text" id="username">
        <br>
        <br>

        <label for="password">Enter Password :</label>
        <input type="password" id="password">
        <br>
        <br>

        <label for="city">City of Employment :</label>
        <input type="text" id="city">
        <br>
        <br>

        <label for="server">Web Server :</label>
        <select name="web server" id="server">
            <option value="server">server 1</option>
            <option value="server">server 2</option>
            <option value="server">server 3</option>
        </select>
        <br>
        <br>

        <label for="date">Date of Joining :</label>
        <input type="date" id="date">
        <br>
        <br>

        <fieldset>
            <legend>Role :</legend>
            <input type="radio" id="role">
            <label for="role">Admin</label>
            <br>
            <legend>Role :</legend>
            <input type="radio" id="role">
            <label for="role">Engineer</label>
            <br>
            <legend>Role :</legend>
            <input type="radio" id="role">
            <label for="role">Manager</label>
            <br>
            <legend>Role :</legend>
            <input type="radio" id="role">
            <label for="role">Guest</label>
            <br>
            
        </fieldset>
        <br>
        <br>

        <fieldset>
            <legend>Sign-on :</legend>
            <input type="checkbox" id="platform">
            <label for="platform">Mail</label>
            <br>
            <input type="checkbox" id="platform">
            <label for="platform">Payroll</label>
            <br>
            <input type="checkbox" id="platform">
            <label for="platform">Self-Service</label>
            <br>
        </fieldset>
        <br>
        <br>

        <input type="submit" value="Submit">
        <input type="button" value="Reset">
    </form>
</body>
</html>
